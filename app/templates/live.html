<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自動売買｜日本株</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --accent:#38bdf8; --text:#e2e8f0; --muted:#94a3b8; --green:#22c55e; --red:#ef4444; --amber:#f59e0b; }
    * { box-sizing:border-box; }
    body { font-family:-apple-system,"Hiragino Sans",sans-serif; background:var(--bg); color:var(--text); margin:0; padding:0 16px 60px; }
    .wrap { max-width:1000px; margin:0 auto; }
    .nav { display:flex; gap:8px; padding:18px 0 0; flex-wrap:wrap; }
    .nav a { padding:8px 16px; border-radius:8px; text-decoration:none; color:var(--muted); background:var(--card); font-size:.9rem; }
    .nav a.active { background:var(--accent); color:#042f3f; font-weight:600; }
    h1 { font-size:1.5rem; padding:18px 0 6px; }
    .sub { color:var(--muted); margin-bottom:18px; font-size:.9rem; line-height:1.6; }
    .card { background:var(--card); border-radius:12px; padding:18px; margin-bottom:18px; }
    button { padding:10px 14px; border-radius:8px; border:none; font-weight:600; cursor:pointer; font-size:.92rem; }
    .btn-primary { background:var(--accent); color:#042f3f; }
    .btn-secondary { background:#334155; color:var(--text); }
    button:hover { opacity:.9; }
    .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    .htmx-indicator { display:none; color:var(--accent); margin-top:6px; }
    .htmx-request .htmx-indicator { display:block; }
    .pill { font-size:.8rem; color:var(--muted); background:#0f172a; padding:6px 12px; border-radius:999px; }
    .exits { display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
    .exits-title { color:var(--muted); font-size:.82rem; }
    .exits label { display:flex; align-items:center; gap:5px; color:var(--text); font-size:.85rem; }
    .exits input { width:58px; padding:7px 8px; border-radius:6px; border:1px solid #334155; background:#0f172a; color:var(--text); }
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="nav">
      <a href="/">バックテスト</a>
      <a href="/screen">調査</a>
      <a href="/paper">ペーパートレード</a>
      <a href="/validate">戦略検証</a>
      <a href="/live" class="active">自動売買</a>
      <a href="/report">振り返り</a>
    </nav>
    <h1>🤖 自動売買ボット（仮想）</h1>
    <p class="sub">
      検証◎の戦略だけを毎営業日 16:30(JST) に自動売買します（アプリ起動中のみ）。約定はその日の終値。<b>実際の発注はしないペーパートレードです。</b>
    </p>

    <div class="card">
      <div class="row">
        <button class="btn-secondary" hx-post="/live/select" hx-target="#panel" hx-indicator="#ind1">
          ① 銘柄選定を更新（検証◎を抽出）
        </button>
        <button class="btn-primary" hx-post="/live/run" hx-target="#panel" hx-indicator="#ind2">
          ② 今日の分を手動実行
        </button>
        <span class="pill">⏰ 次回自動実行: {{ next_run }}</span>
      </div>
      <div id="ind1" class="htmx-indicator">⏳ 全銘柄×全戦略をウォークフォワード検証して選定中…（3〜4分かかります）</div>
      <div id="ind2" class="htmx-indicator">⏳ 最新データ取得＆売買判定中…</div>
    </div>

    <div class="card">
      <form hx-post="/live/exits" hx-target="#panel" hx-indicator="#ind3">
        <div class="exits">
          <span class="exits-title">🚪 ボットの出口ルール（空欄＝無効。次回実行から適用）</span>
          <label>損切り<input type="text" name="stop_loss" inputmode="decimal"
            value="{{ '%g'|format(exit_config.stop_loss * -100) if exit_config.stop_loss is not none else '' }}" placeholder="8">%</label>
          <label>利確<input type="text" name="take_profit" inputmode="decimal"
            value="{{ '%g'|format(exit_config.take_profit * 100) if exit_config.take_profit is not none else '' }}" placeholder="20">%</label>
          <label>トレール<input type="text" name="trailing" inputmode="decimal"
            value="{{ '%g'|format(exit_config.trailing_stop * 100) if exit_config.trailing_stop is not none else '' }}" placeholder="10">%</label>
          <label>ATR損切り<input type="text" name="atr_mult" inputmode="decimal"
            value="{{ '%g'|format(exit_config.atr_mult) if exit_config.atr_mult is not none else '' }}" placeholder="2.5">×</label>
          <button type="submit" class="btn-secondary">設定を保存</button>
        </div>
        <div id="ind3" class="htmx-indicator">⏳ 保存中…</div>
      </form>
    </div>

    <div id="panel">
      {% include "live_panel.html" %}
    </div>
  </div>
</body>
</html>
