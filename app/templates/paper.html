<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ペーパートレード｜日本株</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --accent:#38bdf8; --text:#e2e8f0; --muted:#94a3b8; --green:#22c55e; --red:#ef4444; --amber:#f59e0b; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, "Hiragino Sans", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0 16px 60px; }
    .wrap { max-width: 1000px; margin: 0 auto; }
    .nav { display:flex; gap:8px; padding:18px 0 0; }
    .nav a { padding:8px 16px; border-radius:8px; text-decoration:none; color:var(--muted); background:var(--card); font-size:.9rem; }
    .nav a.active { background:var(--accent); color:#042f3f; font-weight:600; }
    h1 { font-size: 1.5rem; padding: 18px 0 6px; }
    .sub { color: var(--muted); margin-bottom: 20px; font-size: .9rem; }
    .card { background: var(--card); border-radius: 12px; padding: 18px; margin-bottom: 18px; }
    label { display:block; font-size:.8rem; color:var(--muted); margin-bottom:6px; }
    select, button { padding: 10px 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: var(--text); font-size: .92rem; }
    button { cursor:pointer; font-weight:600; border:none; }
    .btn-primary { background: var(--accent); color:#042f3f; }
    .btn-secondary { background:#334155; color:var(--text); }
    .btn-danger { background:transparent; color:var(--red); border:1px solid var(--red); }
    button:hover { opacity:.9; }
    .row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; }
    .htmx-indicator { display:none; color:var(--accent); margin-top:14px; }
    .htmx-request .htmx-indicator { display:block; }
    .check { display:flex; align-items:center; gap:6px; color:var(--muted); font-size:.85rem; }
    .exits { margin-top:14px; display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
    .exits-title { color:var(--muted); font-size:.8rem; }
    .exits label { display:flex; align-items:center; gap:5px; color:var(--text); font-size:.85rem; }
    .exits input { width:58px; padding:7px 8px; border-radius:6px; border:1px solid #334155; background:#0f172a; color:var(--text); }
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="nav">
      <a href="/">バックテスト</a>
      <a href="/screen">調査</a>
      <a href="/paper" class="active">ペーパートレード</a>
      <a href="/validate">戦略検証</a>
      <a href="/live">自動売買</a>
      <a href="/report">振り返り</a>
    </nav>
    <h1>🤖 ペーパートレード＆取引ジャーナル</h1>
    <p class="sub">仮想資金で売買をシミュレーションし、1取引ごとに勝因・敗因を記録。何が良くて何がダメだったかを自動で振り返ります。</p>

    <div class="card">
      <div class="row">
        <div>
          <label>① 過去データを蓄積</label>
          <button class="btn-secondary" hx-post="/paper/collect" hx-target="#journal" hx-indicator="#ind">
            全銘柄の全期間データを収集
          </button>
        </div>
        <form hx-post="/paper/simulate" hx-target="#journal" hx-indicator="#ind">
          <div class="row" style="align-items:flex-end">
            <div>
              <label>② 戦略を選んでシミュレーション</label>
              <select name="strategy">
                {% for key, spec in strategies.items() %}
                <option value="{{ key }}">{{ spec.label }}</option>
                {% endfor %}
              </select>
            </div>
            <button type="submit" class="btn-primary">仮想売買を実行</button>
          </div>
          <div class="exits">
            <span class="exits-title">出口ルール（空欄＝無効。%で入力）</span>
            <label>損切り<input type="text" name="stop_loss" value="8" placeholder="8" inputmode="decimal">%</label>
            <label>利確<input type="text" name="take_profit" value="" placeholder="20" inputmode="decimal">%</label>
            <label>トレール<input type="text" name="trailing" value="" placeholder="10" inputmode="decimal">%</label>
            <label>ATR損切り<input type="text" name="atr_mult" value="" placeholder="2.5" inputmode="decimal">×</label>
          </div>
        </form>
        <div>
          <label>　</label>
          <button class="btn-danger" hx-post="/paper/reset" hx-target="#journal"
                  hx-confirm="取引ジャーナルを全て消去して口座を初期化します。よろしいですか？">
            リセット
          </button>
        </div>
      </div>
      <div id="ind" class="htmx-indicator">⏳ 処理中…（初回のデータ収集は全銘柄で1〜2分かかることがあります）</div>
    </div>

    <div id="journal">
      {% include "journal.html" %}
    </div>
  </div>
</body>
</html>
